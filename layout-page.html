<!-- BGM  SCRIPT -->
<script>
let bgm = document.getElementById("bgm");
let text = document.getElementById("bgmToggle");

function toggleBGM() {
    if (bgm.paused) {
        bgm.play();
        text.innerHTML = "||";
    } else {
        bgm.pause();
        text.innerHTML = ">>";
    }
}
</script>
