<style>
:root {
    --background-colour:        black;
    --background-image:         url("./lib/stars.gif");

    --background-scroll-time:   7s;
    --background-scroll-start:  0px     0px;
    --background-scroll-finish: 0px     154px;

    --overlay-gradient:         linear-gradient(

                                    rgba(100, 0, 255, 0.3) 0%,

    --window-shadow:            rgba(0, 0, 0, 0.75);
    --window-hover-border:      rgb(127, 0, 253);

    --logo-font:                "Bitmgothic";
    --logo-colour:              rgb(255, 255, 255);
    --logo-glow-speed:          2s;
    --logo-glow-colour0:        rgba(255, 0, 255, 0.75);
    --logo-glow-colour1:        rgba(140, 0, 255, 1);

    --font-colour:              rgb(255, 255, 255);
    --font-shadow:              rgba(0, 0, 0, 0.5);
    --select-colour:            rgb(30, 0, 70);
    --select-text-colour:       rgb(240, 167, 255);
    --hover-text-colour:        rgb(247, 207, 255);
    
    --p-size:                   14px;
    --h2-size:                  24px;
    --h3-size:                  18px;

}
</style>
